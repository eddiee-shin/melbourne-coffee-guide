<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>멜번 커피 가이드 - 관리자</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --border: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #34d399;
      --accent-2: #60a5fa;
      --danger: #fb7185;
      --warning: #fbbf24;
      --radius: 16px;
      --shadow: 0 10px 35px rgba(0,0,0,.25);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
      color: var(--text);
    }
    header {
      position: sticky; top: 0; z-index: 20;
      backdrop-filter: blur(14px);
      background: rgba(15, 23, 42, .88);
      border-bottom: 1px solid rgba(255,255,255,.06);
      padding: 16px 20px;
    }
    .header-row, .toolbar {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    }
    .status-row {
      margin-top: 8px;
      color: var(--muted);
      font-size: .88rem;
      line-height: 1.4;
    }
    .scraper-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-left: 8px;
    }
    .scraper-controls input,
    .scraper-controls select {
      width: 180px;
      min-width: 160px;
    }
    .header-title h1 { margin: 0; font-size: 1.25rem; }
    .header-title p { margin: 3px 0 0; color: var(--muted); font-size: .92rem; }
    .spacer { flex: 1; }
    button, input, select, textarea {
      font: inherit;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      color: white;
      background: var(--panel-2);
      transition: transform .15s ease, opacity .15s ease, background .15s ease;
    }
    button:hover { transform: translateY(-1px); }
    button.primary { background: linear-gradient(135deg, #10b981, #059669); }
    button.secondary { background: #334155; }
    button.danger { background: linear-gradient(135deg, #ef4444, #e11d48); }
    button.ghost { background: transparent; border: 1px solid rgba(255,255,255,.12); }
    button:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .wrap { max-width: 1500px; margin: 0 auto; padding: 18px; }
    .card {
      background: rgba(17, 24, 39, .9);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .login-panel, .stats, .filters, .grid-shell {
      margin-top: 16px;
    }
    .login-panel { padding: 18px; max-width: 560px; }
    .login-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; margin-top: 12px; }
    .login-grid input { width: 100%; }
    input, textarea, select {
      width: 100%;
      background: #0b1220;
      color: var(--text);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      padding: 10px 12px;
      outline: none;
    }
    textarea { min-height: 84px; resize: vertical; }
    input:focus, textarea:focus, select:focus { border-color: rgba(96, 165, 250, .9); }
    .stats, .filters {
      display: flex; gap: 12px; flex-wrap: wrap;
      padding: 14px;
      align-items: center;
    }
    .pill {
      background: #0b1220;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 999px;
      padding: 8px 12px;
      color: var(--muted);
      font-size: .9rem;
    }
    .stats strong { color: white; }
    .filters { justify-content: space-between; }
    .filter-group { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; width: 100%; }
    .filter-group > * { flex: 1 1 180px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 16px;
      align-items: start;
    }
    .cafe-card { overflow: hidden; }
    .cafe-card header {
      position: static;
      background: transparent;
      border: 0;
      padding: 0;
      backdrop-filter: none;
    }
    .cafe-inner { padding: 14px; display: grid; gap: 12px; }
    .top-row { display: flex; gap: 12px; }
    .thumb {
      width: 112px; height: 112px; border-radius: 14px; overflow: hidden; flex: 0 0 auto; position: relative;
      background: #0b1220; border: 1px solid rgba(255,255,255,.06);
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb .upload-label {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.42); opacity: 0; transition: opacity .15s ease; text-align: center; font-size: .8rem; padding: 8px;
    }
    .thumb:hover .upload-label { opacity: 1; }
    .thumb input[type=file] { display: none; }
    .title-line { display: flex; align-items: start; gap: 10px; justify-content: space-between; }
    .title-line h3 { margin: 0; font-size: 1.05rem; }
    .meta { color: var(--muted); font-size: .88rem; margin-top: 4px; }
    .badge { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 6px 10px; font-size: .8rem; border: 1px solid rgba(255,255,255,.08); background: #0b1220; }
    .badge.active { color: #86efac; }
    .badge.inactive { color: #fda4af; }
    .field-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .field-grid .full { grid-column: 1 / -1; }
    .field label { display: block; font-size: .78rem; color: var(--muted); margin-bottom: 6px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .actions .spacer { flex: 1; }
    .toast {
      position: fixed; right: 18px; bottom: 18px; z-index: 40; opacity: 0; transform: translateY(10px);
      transition: opacity .2s ease, transform .2s ease;
      background: #0b1220; border: 1px solid rgba(255,255,255,.08); color: white; padding: 12px 16px; border-radius: 14px;
      box-shadow: var(--shadow);
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-color: rgba(52,211,153,.4); }
    .toast.error { border-color: rgba(251,113,133,.4); }
    .hidden { display: none !important; }
    .empty { padding: 22px; text-align: center; color: var(--muted); }
    .small { font-size: .82rem; color: var(--muted); }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .login-grid { grid-template-columns: 1fr; }
      .field-grid { grid-template-columns: 1fr; }
      .top-row { flex-direction: column; }
      .thumb { width: 100%; height: 220px; }
    }
      /* Scraper Console Styles */
      .console-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
      .console-overlay.show {
        opacity: 1;
        pointer-events: auto;
      }
      .console-box {
        width: 90%;
        max-width: 800px;
        height: 80%;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      }
      .console-header {
        background: #161b22;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #30363d;
      }
      .console-header-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .console-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }
      .console-dot.red { background: #ff5f56; }
      .console-dot.yellow { background: #ffbd2e; }
      .console-dot.green { background: #27c93f; }
      .console-title {
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        font-size: 14px;
        color: #c9d1d9;
      }
      .console-body {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
        font-size: 13px;
        line-height: 1.6;
        color: #e6edf3;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .console-body::-webkit-scrollbar { width: 8px; }
      .console-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
      .console-close {
        background: none;
        border: none;
        color: #8b949e;
        cursor: pointer;
        font-size: 20px;
        padding: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.2s;
      }
      .console-close:hover { color: #f85149; }
      .log-line { margin-bottom: 4px; }
      .log-line.error { color: #ff7b72; }
      .log-line.success { color: #3fb950; }
      .log-line.info { color: #58a6ff; }
      
      /* Comment Management Styles */
      .comment-section { margin-top: 24px; padding: 20px; }
      .comment-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
      .comment-table th, .comment-table td { 
        text-align: left; padding: 12px; border-bottom: 1px solid rgba(255,255,255,.06); 
      }
      .comment-table th { color: var(--muted); font-size: 0.85rem; font-weight: 500; }
      .comment-table tr:hover { background: rgba(255,255,255,.02); }
  </style>
</head>
<body>
  <!-- Scraper Console Overlay -->
  <div id="consoleOverlay" class="console-overlay">
    <div class="console-box">
      <div class="console-header">
        <div class="console-header-left">
          <div class="console-dot red"></div>
          <div class="console-dot yellow"></div>
          <div class="console-dot green"></div>
          <span class="console-title">Scraper Activity Log</span>
        </div>
        <button id="closeConsoleBtn" class="console-close">&times;</button>
      </div>
      <div id="consoleBody" class="console-body"></div>
    </div>
  </div>

  <header>
    <div class="header-row wrap" style="padding:0;">
      <div class="header-title">
        <h1>☕ 멜번 커피 가이드 — 관리자</h1>
        <p>카페 전체 정보 관리, 활성/비활성 토글, 이미지 업로드</p>
      </div>
      <div class="spacer"></div>
      <div class="header-row">
        <div class="scraper-controls">
          <input id="scraperQuery" type="text" value="Melbourne coffee" placeholder="스크래퍼 검색어" />
          <select id="scraperMode">
            <option value="rest">rest</option>
            <option value="dry-run">dry-run</option>
            <option value="sql">sql</option>
          </select>
          <input id="scraperMaxNew" type="number" min="1" placeholder="최대 새 카페 수" />
        </div>
        <button class="secondary" id="refreshBtn">새로고침</button>
        <button class="ghost" id="logoutBtn" disabled>로그아웃</button>
        <button class="primary" id="scraperBtn" disabled>스크래퍼 실행</button>
        <button class="danger" id="saveAllBtn" disabled>모든 저장</button>
      </div>
    </div>
    <div class="wrap status-row" id="authStatus">상태: 초기화 중</div>
  </header>

  <main class="wrap">
    <section class="card login-panel" id="loginPanel">
      <h2 style="margin:0 0 6px;">로그인</h2>
      <div class="small">Supabase Auth 계정으로 로그인하세요. admin_users에 등록된 계정만 접근할 수 있습니다.</div>
      <div class="login-grid">
        <input id="emailInput" type="email" placeholder="이메일" autocomplete="email" />
        <input id="passwordInput" type="password" placeholder="비밀번호" autocomplete="current-password" />
        <button class="primary" id="loginBtn">로그인</button>
      </div>
    </section>

    <section class="card stats hidden" id="statsBar">
      <div class="pill">총 카페: <strong id="totalCount">0</strong></div>
      <div class="pill">활성: <strong id="activeCount">0</strong></div>
      <div class="pill">비활성: <strong id="inactiveCount">0</strong></div>
      <div class="pill">수정 중: <strong id="dirtyCount">0</strong></div>
      <div class="pill">업로드됨: <strong id="uploadedCount">0</strong></div>
    </section>

    <section class="card filters hidden" id="filtersBar">
      <div class="filter-group">
        <input id="searchInput" type="search" placeholder="이름 / 서브럽 / 위치 검색" />
        <select id="statusFilter">
          <option value="all">전체</option>
          <option value="active">활성만</option>
          <option value="inactive">비활성만</option>
        </select>
        <button class="secondary" id="clearFiltersBtn">필터 초기화</button>
      </div>
    </section>

    <section class="card hidden" id="accessDenied" style="padding:18px; margin-top:16px;">
      <h2 style="margin:0 0 8px;">접근 권한이 없습니다</h2>
      <div class="small">현재 로그인한 계정이 admin_users 테이블에 등록되어 있지 않습니다.</div>
    </section>

    <section class="grid-shell hidden" id="dashboard">
      <div class="grid" id="cafeGrid"></div>
      <div class="card empty hidden" id="emptyState">표시할 카페가 없습니다.</div>
    </section>

    <!-- Comment Management Section -->
    <section class="card comment-section hidden" id="commentSection">
      <h2 style="margin: 0 0 12px;">최근 댓글 관리</h2>
      <div style="overflow-x: auto;">
        <table class="comment-table">
          <thead>
            <tr>
              <th style="width: 120px;">날짜</th>
              <th style="width: 150px;">카페</th>
              <th>내용</th>
              <th style="width: 80px; text-align: right;">관리</th>
            </tr>
          </thead>
          <tbody id="commentTableBody">
            <!-- Comments will be rendered here -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

    };
  </script>

</body>
</html>
